name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    name: Test Python 3.10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run Ruff
        run: ruff check .

      - name: Run MyPy
        run: mypy src
