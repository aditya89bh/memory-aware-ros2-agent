name: SBOM

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  generate:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and SBOM tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Generate SBOM
        run: cyclonedx-py environment --of JSON --output-file sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-json
          path: sbom.cdx.json
